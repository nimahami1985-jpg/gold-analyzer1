name: Gold Analyzer

on:
  schedule:
    - cron: "30 5 * * *"
    - cron: "30 8 * * *"
    - cron: "30 12 * * *"
    - cron: "30 14 * * *"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
